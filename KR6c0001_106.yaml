body:
  text: 爾時會中所有四大王衆天乃至色究竟天同時化作種種天花衣服瓔珞及香鬘等踊身虛空而散佛上合掌恭敬俱白佛言願此般若波羅蜜多在贍部洲人中久住何以故乃至般若波羅蜜多在贍部洲人中流布當知此處佛寶法寶苾芻僧寶久住不滅於此三千大千世界乃至十方無量無數無邊佛國亦復如是由此菩薩摩訶薩衆及殊勝行亦可了知世尊隨諸方邑有善男子善女人等以淨信心書持如是甚深般若波羅蜜多恭敬供養當知是處有妙光明除滅暗冥生諸勝利爾時佛告天帝釋等諸天衆言如是如是如汝所説乃至般若波羅蜜多在贍部洲人中流布當知此處佛寶法寶苾芻僧寶久住不滅於此三千大千世界乃至十方無量無數無邊佛國亦復如是由此菩薩摩訶薩衆及殊勝行亦可了知隨諸方邑有善男子善女人等以淨信心書持如是甚深般若波羅蜜多恭敬供養當知是處有妙光明除滅暗冥生諸勝利時諸天衆復化種種上妙天花衣服瓔珞及香鬘等而散佛上重白佛言若善男子善女人等於此般若波羅蜜多至心聽聞受持讀誦精勤修學如理思惟廣為有情宣説流布是善男子善女人等魔及眷屬不得其便我等諸天亦常隨逐是善男子善女人等勤加擁護令無損惱何以故是善男子善女人等我等諸天敬事如佛或如近佛尊重法故爾時天帝釋白佛言世尊若善男子善女人等於此般若波羅蜜多至心聽聞受持讀誦精勤修學如理思惟廣為有情宣説流布是善男子善女人等非少善根能辦是事定於先世無量佛所多集善根多發正願多供養佛多善知識之所攝受乃能於此甚深般若波羅蜜多至心聽聞受持讀誦精勤修學如理思惟廣為有情宣説流布世尊欲得諸佛一切智智當求般若波羅蜜多欲得般若波羅蜜多當求諸佛一切智智何以故諸佛所得一切智智皆從般若波羅蜜多而得生故如是般若波羅蜜多皆從諸佛一切智智而得生故所以者何諸佛所得一切智智不異般若波羅蜜多如是般若波羅蜜多不異諸佛一切智智諸佛所得一切智智與此般若波羅蜜多當知無二亦無二分爾時佛告天帝釋言如是如是如汝所説憍尸迦欲得諸佛一切智智當求般若波羅蜜多欲得般若波羅蜜多當求諸佛一切智智何以故諸佛所得一切智智皆從般若波羅蜜多而得生故如是般若波羅蜜多皆從諸佛一切智智而得生故所以者何諸佛所得一切智智不異般若波羅蜜多如是般若波羅蜜多不異諸佛一切智智諸佛所得一切智智與此般若波羅蜜多當知無二亦無二分是故般若波羅蜜多功德威神甚為希有爾時具壽慶喜白佛言世尊何緣不廣稱讚布施波羅蜜多淨戒波羅蜜多安忍波羅蜜多精進波羅蜜多靜慮波羅蜜多但廣稱讚般若波羅蜜多世尊何緣不廣稱讚內空外空內外空空空大空勝義空有為空無為空畢竟空無際空散空無變異空本性空自相空共相空一切法空不可得空無性空自性空無性自性空但廣稱讚般若波羅蜜多世尊何緣不廣稱讚真如法界法性不虛妄性不變異性平等性離生性法定法住實際虛空界不思議界但廣稱讚般若波羅蜜多世尊何緣不廣稱讚苦聖諦集聖諦滅聖諦道聖諦但廣稱讚般若波羅蜜多世尊何緣不廣稱讚四靜慮四無量四無色定但廣稱讚般若波羅蜜多世尊何緣不廣稱讚八解脫八勝處九次第定十遍處但廣稱讚般若波羅蜜多世尊何緣不廣稱讚四念住四正斷四神足五根五力七等覺支八聖道支但廣稱讚般若波羅蜜多世尊何緣不廣稱讚空解脫門無相解脫門無願解脫門但廣稱讚般若波羅蜜多世尊何緣不廣稱讚五眼六神通但廣稱讚般若波羅蜜多世尊何緣不廣稱讚佛十力四無所畏四無礙解大慈大悲大喜大捨十八佛不共法但廣稱讚般若波羅蜜多世尊何緣不廣稱讚無忘失法恆住捨性但廣稱讚般若波羅蜜多世尊何緣不廣稱讚一切智道相智一切相智但廣稱讚般若波羅蜜多世尊何緣不廣稱讚一切陀羅尼門一切三摩地門但廣稱讚般若波羅蜜多世尊何緣不廣稱讚菩薩摩訶薩行但廣稱讚般若波羅蜜多世尊何緣不廣稱讚阿耨多羅三藐三菩提但廣稱讚般若波羅蜜多佛言慶喜汝今當知由此般若波羅蜜多與彼布施波羅蜜多淨戒波羅蜜多安忍波羅蜜多精進波羅蜜多靜慮波羅蜜多為尊為導故我但廣稱讚般若波羅蜜多慶喜當知由此般若波羅蜜多與彼內空外空內外空空空大空勝義空有為空無為空畢竟空無際空散空無變異空本性空自相空共相空一切法空不可得空無性空自性空無性自性空為尊為導故我但廣稱讚般若波羅蜜多慶喜當知由此般若波羅蜜多與彼真如法界法性不虛妄性不變異性平等性離生性法定法住實際虛空界不思議界為尊為導故我但廣稱讚般若波羅蜜多慶喜當知由此般若波羅蜜多與彼苦聖諦集聖諦滅聖諦道聖諦為尊為導故我但廣稱讚般若波羅蜜多慶喜當知由此般若波羅蜜多與彼四靜慮四無量四無色定為尊為導故我但廣稱讚般若波羅蜜多慶喜當知由此般若波羅蜜多與彼八解脫八勝處九次第定十遍處為尊為導故我但廣稱讚般若波羅蜜多慶喜當知由此般若波羅蜜多與彼四念住四正斷四神足五根五力七等覺支八聖道支為尊為導故我但廣稱讚般若波羅蜜多慶喜當知由此般若波羅蜜多與彼空解脫門無相解脫門無願解脫門為尊為導故我但廣稱讚般若波羅蜜多慶喜當知由此般若波羅蜜多與彼五眼六神通為尊為導故我但廣稱讚般若波羅蜜多慶喜當知由此般若波羅蜜多與彼佛十力四無所畏四無礙解大慈大悲大喜大捨十八佛不共法為尊為導故我但廣稱讚般若波羅蜜多慶喜當知由此般若波羅蜜多與彼無忘