  text: 復次憍尸迦若善男子善女人等為發無上菩提心者説舌界若常若無常説味界舌識界及舌觸舌觸為緣所生諸受若常若無常説舌界若樂若苦説味界舌識界及舌觸舌觸為緣所生諸受若樂若苦説舌界若我若無我説味界舌識界及舌觸舌觸為緣所生諸受若我若無我説舌界若淨若不淨説味界舌識界及舌觸舌觸為緣所生諸受若淨若不淨若有能依如是等法修行靜慮是行靜慮波羅蜜多復作是説行靜慮者應求舌界若常若無常應求味界乃至舌觸為緣所生諸受若常若無常應求舌界若樂若苦應求味界乃至舌觸為緣所生諸受若樂若苦應求舌界若我若無我應求味界乃至舌觸為緣所生諸受若我若無我應求舌界若淨若不淨應求味界乃至舌觸為緣所生諸受若淨若不淨若有能求如是等法修行靜慮是行靜慮波羅蜜多憍尸迦若善男子善女人等如是求舌界若常若無常求味界乃至舌觸為緣所生諸受若常若無常求舌界若樂若苦求味界乃至舌觸為緣所生諸受若樂若苦求舌界若我若無我求味界乃至舌觸為緣所生諸受若我若無我求舌界若淨若不淨求味界乃至舌觸為緣所生諸受若淨若不淨依此等法行靜慮者我説名為行有所得相似靜慮波羅蜜多憍尸迦如前所説當知皆是説有所得相似靜慮波羅蜜多復次憍尸迦若善男子善女人等為發無上菩提心者説身界若常若無常説觸界身識界及身觸身觸為緣所生諸受若常若無常説身界若樂若苦説觸界身識界及身觸身觸為緣所生諸受若樂若苦説身界若我若無我説觸界身識界及身觸身觸為緣所生諸受若我若無我説身界若淨若不淨説觸界身識界及身觸身觸為緣所生諸受若淨若不淨若有能依如是等法修行靜慮是行靜慮波羅蜜多復作是説行靜慮者應求身界若常若無常應求觸界乃至身觸為緣所生諸受若常若無常應求身界若樂若苦應求觸界乃至身觸為緣所生諸受若樂若苦應求身界若我若無我應求觸界乃至身觸為緣所生諸受若我若無我應求身界若淨若不淨應求觸界乃至身觸為緣所生諸受若淨若不淨若有能求如是等法修行靜慮是行靜慮波羅蜜多憍尸迦若善男子善女人等如是求身界若常若無常求觸界乃至身觸為緣所生諸受若常若無常求身界若樂若苦求觸界乃至身觸為緣所生諸受若樂若苦求身界若我若無我求觸界乃至身觸為緣所生諸受若我若無我求身界若淨若不淨求觸界乃至身觸為緣所生諸受若淨若不淨依此等法行靜慮者我説名為行有所得相似靜慮波羅蜜多憍尸迦如前所説當知皆是説有所得相似靜慮波羅蜜多復次憍尸迦若善男子善女人等為發無上菩提心者説意界若常若無常説法界意識界及意觸意觸為緣所生諸受若常若無常説意界若樂若苦説法界意識界及意觸意觸為緣所生諸受若樂若苦説意界若我若無我説法界意識界及意觸意觸為緣所生諸受若我若無我説意界若淨若不淨説法界意識界及意觸意觸為緣所生諸受若淨若不淨若有能依如是等法修行靜慮是行靜慮波羅蜜多復作是説行靜慮者應求意界若常若無常應求法界乃至意觸為緣所生諸受若常若無常應求意界若樂若苦應求法界乃至意觸為緣所生諸受若樂若苦應求意界若我若無我應求法界乃至意觸為緣所生諸受若我若無我應求意界若淨若不淨應求法界乃至意觸為緣所生諸受若淨若不淨若有能求如是等法修行靜慮是行靜慮波羅蜜多憍尸迦若善男子善女人等如是求意界若常若無常求法界乃至意觸為緣所生諸受若常若無常求意界若樂若苦求法界乃至意觸為緣所生諸受若樂若苦求意界若我若無我求法界乃至意觸為緣所生諸受若我若無我求意界若淨若不淨求法界乃至意觸為緣所生諸受若淨若不淨依此等法行靜慮者我説名為行有所得相似靜慮波羅蜜多憍尸迦如前所説當知皆是説有所得相似靜慮波羅蜜多復次憍尸迦若善男子善女人等為發無上菩提心者説地界若常若無常説水火風空識界若常若無常説地界若樂若苦説水火風空識界若樂若苦説地界若我若無我説水火風空識界若我若無我説地界若淨若不淨説水火風空識界若淨若不淨若有能依如是等法修行靜慮是行靜慮波羅蜜多復作是説行靜慮者應求地界若常若無常應求水火風空識界若常若無常應求地界若樂若苦應求水火風空識界若樂若苦應求地界若我若無我應求水火風空識界若我若無我應求地界若淨若不淨應求水火風空識界若淨若不淨若有能求如是等法修行靜慮是行靜慮波羅蜜多憍尸迦若善男子善女人等如是求地界若常若無常求水火風空識界若常若無常求地界若樂若苦求水火風空識界若樂若苦求地界若我若無我求水火風空識界若我若無我求地界若淨若不淨求水火風空識界若淨若不淨依此等法行靜慮者我説名為行有所得相似靜慮波羅蜜多憍尸迦如前所説當知皆是説有所得相似靜慮波羅蜜多復次憍尸迦若善男子善女人等為發無上菩提心者説無明若常若無常説行識名色六處觸受愛取有生老死愁歎苦憂惱若常若無常説無明若樂若苦説行識名色六處觸受愛取有生老死愁歎苦憂惱若樂若苦説無明若我若無我説行識名色六處觸受愛取有生老死愁歎苦憂惱若我若無我説無明若淨若不淨説行識名色六處觸受愛取有生老死愁歎苦憂惱若淨若不淨若有能依如是等法修行靜慮是行靜慮波羅蜜多復作是説行靜慮者應求無明若常若無常應求行乃至老死愁歎苦憂惱若常若無常應求無明若樂若苦應求行乃至老死愁歎苦憂惱若樂若苦應求無明若我若無我應求行乃至老