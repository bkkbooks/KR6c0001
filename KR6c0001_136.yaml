body:
  text: 爾時天帝釋白佛言世尊云何名説相似般若靜慮精進安忍淨戒布施波羅蜜多佛言憍尸迦若善男子善女人等説有所得般若靜慮精進安忍淨戒布施波羅蜜多如是名説相似般若靜慮精進安忍淨戒布施波羅蜜多時天帝釋復白佛言世尊云何諸善男子善女人等説有所得般若波羅蜜多名説相似般若波羅蜜多佛言憍尸迦若善男子善女人等為發無上菩提心者説色若常若無常説受想行識若常若無常説色若樂若苦説受想行識若樂若苦説色若我若無我説受想行識若我若無我説色若淨若不淨説受想行識若淨若不淨若有能依如是等法修行般若是行般若波羅蜜多復作是説行般若者應求色若常若無常應求受想行識若常若無常應求色若樂若苦應求受想行識若樂若苦應求色若我若無我應求受想行識若我若無我應求色若淨若不淨應求受想行識若淨若不淨若有能求如是等法修行般若是行般若波羅蜜多憍尸迦若善男子善女人等如是求色若常若無常求受想行識若常若無常求色若樂若苦求受想行識若樂若苦求色若我若無我求受想行識若我若無我求色若淨若不淨求受想行識若淨若不淨依此等法行般若者我説名為行有所得相似般若波羅蜜多憍尸迦如前所説當知皆是説有所得相似般若波羅蜜多復次憍尸迦若善男子善女人等為發無上菩提心者説眼處若常若無常説耳鼻舌身意處若常若無常説眼處若樂若苦説耳鼻舌身意處若樂若苦説眼處若我若無我説耳鼻舌身意處若我若無我説眼處若淨若不淨説耳鼻舌身意處若淨若不淨若有能依如是等法修行般若是行般若波羅蜜多復作是説行般若者應求眼處若常若無常應求耳鼻舌身意處若常若無常應求眼處若樂若苦應求耳鼻舌身意處若樂若苦應求眼處若我若無我應求耳鼻舌身意處若我若無我應求眼處若淨若不淨應求耳鼻舌身意處若淨若不淨若有能求如是等法修行般若是行般若波羅蜜多憍尸迦若善男子善女人等如是求眼處若常若無常求耳鼻舌身意處若常若無常求眼處若樂若苦求耳鼻舌身意處若樂若苦求眼處若我若無我求耳鼻舌身意處若我若無我求眼處若淨若不淨求耳鼻舌身意處若淨若不淨依此等法行般若者我説名為行有所得相似般若波羅蜜多憍尸迦如前所説當知皆是説有所得相似般若波羅蜜多復次憍尸迦若善男子善女人等為發無上菩提心者説色處若常若無常説聲香味觸法處若常若無常説色處若樂若苦説聲香味觸法處若樂若苦説色處若我若無我説聲香味觸法處若我若無我説色處若淨若不淨説聲香味觸法處若淨若不淨若有能依如是等法修行般若是行般若波羅蜜多復作是説行般若者應求色處若常若無常應求聲香味觸法處若常若無常應求色處若樂若苦應求聲香味觸法處若樂若苦應求色處若我若無我應求聲香味觸法處若我若無我應求色處若淨若不淨應求聲香味觸法處若淨若不淨若有能求如是等法修行般若是行般若波羅蜜多憍尸迦若善男子善女人等如是求色處若常若無常求聲香味觸法處若常若無常求色處若樂若苦求聲香味觸法處若樂若苦求色處若我若無我求聲香味觸法處若我若無我求色處若淨若不淨求聲香味觸法處若淨若不淨依此等法行般若者我説名為行有所得相似般若波羅蜜多憍尸迦如前所説當知皆是説有所得相似般若波羅蜜多復次憍尸迦若善男子善女人等為發無上菩提心者説眼界若常若無常説色界眼識界及眼觸眼觸為緣所生諸受若常若無常説眼界若樂若苦説色界眼識界及眼觸眼觸為緣所生諸受若樂若苦説眼界若我若無我説色界眼識界及眼觸眼觸為緣所生諸受若我若無我説眼界若淨若不淨説色界眼識界及眼觸眼觸為緣所生諸受若淨若不淨若有能依如是等法修行般若是行般若波羅蜜多復作是説行般若者應求眼界若常若無常應求色界眼識界及眼觸眼觸為緣所生諸受若常若無常應求眼界若樂若苦應求色界眼識界及眼觸眼觸為緣所生諸受若樂若苦應求眼界若我若無我應求色界眼識界及眼觸眼觸為緣所生諸受若我若無我應求眼界若淨若不淨應求色界眼識界及眼觸眼觸為緣所生諸受若淨若不淨若有能求如是等法修行般若是行般若波羅蜜多憍尸迦若善男子善女人等如是求眼界若常若無常求色界眼識界及眼觸眼觸為緣所生諸受若常若無常求眼界若樂若苦求色界眼識界及眼觸眼觸為緣所生諸受若樂若苦求眼界若我若無我求色界眼識界及眼觸眼觸為緣所生諸受若我若無我求眼界若淨若不淨求色界眼識界及眼觸眼觸為緣所生諸受若淨若不淨依此等法行般若者我説名為行有所得相似般若波羅蜜多憍尸迦如前所説當知皆是説有所得相似般若波羅蜜多復次憍尸迦若善男子善女人等為發無上菩提心者説耳界若常若無常説聲界耳識界及耳觸耳觸為緣所生諸受若常若無常説耳界若樂若苦説聲界耳識界及耳觸耳觸為緣所生諸受若樂若苦説耳界若我若無我説聲界耳識界及耳觸耳觸為緣所生諸受若我若無我説耳界若淨若不淨説聲界耳識界及耳觸耳觸為緣所生諸受若淨若不淨若有能依如是等法修行般若是行般若波羅蜜多復作是説行般若者應求耳界若常若無常應求聲界耳識界及耳觸耳觸為緣所生諸受若常若無常應求耳界若樂若苦應求聲界耳識界及耳觸耳觸為緣所生諸受若樂若苦應求耳界若我若無我應求聲界耳識界及耳觸耳觸為緣所生諸受若我若無我應求耳界若淨若不淨應求聲界耳識界及耳觸耳觸為緣所生諸受若淨若不淨若有能求