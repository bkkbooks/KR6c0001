body:
  text: 復次憍尸迦若善男子善女人等為發無上菩提心者説八解脫若常若無常説八勝處九次第定十遍處若常若無常説八解脫若樂若苦説八勝處九次第定十遍處若樂若苦説八解脫若我若無我説八勝處九次第定十遍處若我若無我説八解脫若淨若不淨説八勝處九次第定十遍處若淨若不淨若有能依如是等法修行安忍是行安忍波羅蜜多復作是説行安忍者應求八解脫若常若無常應求八勝處九次第定十遍處若常若無常應求八解脫若樂若苦應求八勝處九次第定十遍處若樂若苦應求八解脫若我若無我應求八勝處九次第定十遍處若我若無我應求八解脫若淨若不淨應求八勝處九次第定十遍處若淨若不淨若有能求如是等法修行安忍是行安忍波羅蜜多憍尸迦若善男子善女人等如是求八解脫若常若無常求八勝處九次第定十遍處若常若無常求八解脫若樂若苦求八勝處九次第定十遍處若樂若苦求八解脫若我若無我求八勝處九次第定十遍處若我若無我求八解脫若淨若不淨求八勝處九次第定十遍處若淨若不淨依此等法行安忍者我説名為行有所得相似安忍波羅蜜多憍尸迦如前所説當知皆是説有所得相似安忍波羅蜜多復次憍尸迦若善男子善女人等為發無上菩提心者説四念住若常若無常説四正斷四神足五根五力七等覺支八聖道支若常若無常説四念住若樂若苦説四正斷四神足五根五力七等覺支八聖道支若樂若苦説四念住若我若無我説四正斷四神足五根五力七等覺支八聖道支若我若無我説四念住若淨若不淨説四正斷四神足五根五力七等覺支八聖道支若淨若不淨若有能依如是等法修行安忍是行安忍波羅蜜多復作是説行安忍者應求四念住若常若無常應求四正斷乃至八聖道支若常若無常應求四念住若樂若苦應求四正斷乃至八聖道支若樂若苦應求四念住若我若無我應求四正斷乃至八聖道支若我若無我應求四念住若淨若不淨應求四正斷乃至八聖道支若淨若不淨若有能求如是等法修行安忍是行安忍波羅蜜多憍尸迦若善男子善女人等如是求四念住若常若無常求四正斷乃至八聖道支若常若無常求四念住若樂若苦求四正斷乃至八聖道支若樂若苦求四念住若我若無我求四正斷乃至八聖道支若我若無我求四念住若淨若不淨求四正斷乃至八聖道支若淨若不淨依此等法行安忍者我説名為行有所得相似安忍波羅蜜多憍尸迦如前所説當知皆是説有所得相似安忍波羅蜜多復次憍尸迦若善男子善女人等為發無上菩提心者説空解脫門若常若無常説無相無願解脫門若常若無常説空解脫門若樂若苦説無相無願解脫門若樂若苦説空解脫門若我若無我説無相無願解脫門若我若無我説空解脫門若淨若不淨説無相無願解脫門若淨若不淨若有能依如是等法修行安忍是行安忍波羅蜜多復作是説行安忍者應求空解脫門若常若無常應求無相無願解脫門若常若無常應求空解脫門若樂若苦應求無相無願解脫門若樂若苦應求空解脫門若我若無我應求無相無願解脫門若我若無我應求空解脫門若淨若不淨應求無相無願解脫門若淨若不淨若有能求如是等法修行安忍是行安忍波羅蜜多憍尸迦若善男子善女人等如是求空解脫門若常若無常求無相無願解脫門若常若無常求空解脫門若樂若苦求無相無願解脫門若樂若苦求空解脫門若我若無我求無相無願解脫門若我若無我求空解脫門若淨若不淨求無相無願解脫門若淨若不淨依此等法行安忍者我説名為行有所得相似安忍波羅蜜多憍尸迦如前所説當知皆是説有所得相似安忍波羅蜜多復次憍尸迦若善男子善女人等為發無上菩提心者説五眼若常若無常説六神通若常若無常説五眼若樂若苦説六神通若樂若苦説五眼若我若無我説六神通若我若無我説五眼若淨若不淨説六神通若淨若不淨若有能依如是等法修行安忍是行安忍波羅蜜多復作是説行安忍者應求五眼若常若無常應求六神通若常若無常應求五眼若樂若苦應求六神通若樂若苦應求五眼若我若無我應求六神通若我若無我應求五眼若淨若不淨應求六神通若淨若不淨若有能求如是等法修行安忍是行安忍波羅蜜多憍尸迦若善男子善女人等如是求五眼若常若無常求六神通若常若無常求五眼若樂若苦求六神通若樂若苦求五眼若我若無我求六神通若我若無我求五眼若淨若不淨求六神通若淨若不淨依此等法行安忍者我説名為行有所得相似安忍波羅蜜多憍尸迦如前所説當知皆是説有所得相似安忍波羅蜜多復次憍尸迦若善男子善女人等為發無上菩提心者説佛十力若常若無常説四無所畏四無礙解大慈大悲大喜大捨十八佛不共法若常若無常説佛十力若樂若苦説四無所畏四無礙解大慈大悲大喜大捨十八佛不共法若樂若苦説佛十力若我若無我説四無所畏四無礙解大慈大悲大喜大捨十八佛不共法若我若無我説佛十力若淨若不淨説四無所畏四無礙解大慈大悲大喜大捨十八佛不共法若淨若不淨若有能依如是等法修行安忍是行安忍波羅蜜多復作是説行安忍者應求佛十力若常若無常應求四無所畏乃至十八佛不共法若常若無常應求佛十力若樂若苦應求四無所畏乃至十八佛不共法若樂若苦應求佛十力若我若無我應求四無所畏乃至十八佛不共法若我若無我應求佛十力若淨若不淨應求四無所畏乃至十八佛不共法若淨若不淨若有能求如是等法修行安忍是行安忍波羅蜜多憍尸迦若善男子善女人等如是求佛十力若常若無常求四無所畏乃至十八佛不共法