body:
  text: 復次憍尸迦若善男子善女人等為發無上菩提心者宣説淨戒波羅蜜多作如是言汝善男子應修淨戒波羅蜜多不應觀一切菩薩摩訶薩行若常若無常何以故一切菩薩摩訶薩行一切菩薩摩訶薩行自性空是一切菩薩摩訶薩行自性即非自性若非自性即是淨戒波羅蜜多於此淨戒波羅蜜多一切菩薩摩訶薩行不可得彼常無常亦不可得所以者何此中尚無一切菩薩摩訶薩行可得何況有彼常與無常汝若能修如是淨戒是修淨戒波羅蜜多復作是言汝善男子應修淨戒波羅蜜多不應觀一切菩薩摩訶薩行若樂若苦何以故一切菩薩摩訶薩行一切菩薩摩訶薩行自性空是一切菩薩摩訶薩行自性即非自性若非自性即是淨戒波羅蜜多於此淨戒波羅蜜多一切菩薩摩訶薩行不可得彼樂與苦亦不可得所以者何此中尚無一切菩薩摩訶薩行可得何況有彼樂之與苦汝若能修如是淨戒是修淨戒波羅蜜多復作是言汝善男子應修淨戒波羅蜜多不應觀一切菩薩摩訶薩行若我若無我何以故一切菩薩摩訶薩行一切菩薩摩訶薩行自性空是一切菩薩摩訶薩行自性即非自性若非自性即是淨戒波羅蜜多於此淨戒波羅蜜多一切菩薩摩訶薩行不可得彼我無我亦不可得所以者何此中尚無一切菩薩摩訶薩行可得何況有彼我與無我汝若能修如是淨戒是修淨戒波羅蜜多復作是言汝善男子應修淨戒波羅蜜多不應觀一切菩薩摩訶薩行若淨若不淨何以故一切菩薩摩訶薩行一切菩薩摩訶薩行自性空是一切菩薩摩訶薩行自性即非自性若非自性即是淨戒波羅蜜多於此淨戒波羅蜜多一切菩薩摩訶薩行不可得彼淨不淨亦不可得所以者何此中尚無一切菩薩摩訶薩行可得何況有彼淨與不淨汝若能修如是淨戒是修淨戒波羅蜜多憍尸迦是善男子善女人等作此等説是為宣説真正淨戒波羅蜜多復次憍尸迦若善男子善女人等為發無上菩提心者宣説淨戒波羅蜜多作如是言汝善男子應修淨戒波羅蜜多不應觀諸佛無上正等菩提若常若無常何以故諸佛無上正等菩提諸佛無上正等菩提自性空是諸佛無上正等菩提自性即非自性若非自性即是淨戒波羅蜜多於此淨戒波羅蜜多諸佛無上正等菩提不可得彼常無常亦不可得所以者何此中尚無諸佛無上正等菩提可得何況有彼常與無常汝若能修如是淨戒是修淨戒波羅蜜多復作是言汝善男子應修淨戒波羅蜜多不應觀諸佛無上正等菩提若樂若苦何以故諸佛無上正等菩提諸佛無上正等菩提自性空是諸佛無上正等菩提自性即非自性若非自性即是淨戒波羅蜜多於此淨戒波羅蜜多諸佛無上正等菩提不可得彼樂與苦亦不可得所以者何此中尚無諸佛無上正等菩提可得何況有彼樂之與苦汝若能修如是淨戒是修淨戒波羅蜜多復作是言汝善男子應修淨戒波羅蜜多不應觀諸佛無上正等菩提若我若無我何以故諸佛無上正等菩提諸佛無上正等菩提自性空是諸佛無上正等菩提自性即非自性若非自性即是淨戒波羅蜜多於此淨戒波羅蜜多諸佛無上正等菩提不可得彼我無我亦不可得所以者何此中尚無諸佛無上正等菩提可得何況有彼我與無我汝若能修如是淨戒是修淨戒波羅蜜多復作是言汝善男子應修淨戒波羅蜜多不應觀諸佛無上正等菩提若淨若不淨何以故諸佛無上正等菩提諸佛無上正等菩提自性空是諸佛無上正等菩提自性即非自性若非自性即是淨戒波羅蜜多於此淨戒波羅蜜多諸佛無上正等菩提不可得彼淨不淨亦不可得所以者何此中尚無諸佛無上正等菩提可得何況有彼淨與不淨汝若能修如是淨戒是修淨戒波羅蜜多憍尸迦是善男子善女人等作此等説是為宣説真正淨戒波羅蜜多時天帝釋復白佛言世尊云何諸善男子善女人等説無所得布施波羅蜜多名説真正布施波羅蜜多佛言憍尸迦若善男子善女人等為發無上菩提心者宣説布施波羅蜜多作如是言汝善男子應修布施波羅蜜多不應觀色若常若無常不應觀受想行識若常若無常何以故色色自性空受想行識受想行識自性空是色自性即非自性是受想行識自性亦非自性若非自性即是布施波羅蜜多於此布施波羅蜜多色不可得彼常無常亦不可得受想行識皆不可得彼常無常亦不可得所以者何此中尚無色等可得何況有彼常與無常汝若能修如是布施是修布施波羅蜜多復作是言汝善男子應修布施波羅蜜多不應觀色若樂若苦不應觀受想行識若樂若苦何以故色色自性空受想行識受想行識自性空是色自性即非自性是受想行識自性亦非自性若非自性即是布施波羅蜜多於此布施波羅蜜多色不可得彼樂與苦亦不可得受想行識皆不可得彼樂與苦亦不可得所以者何此中尚無色等可得何況有彼樂之與苦汝若能修如是布施是修布施波羅蜜多復作是言汝善男子應修布施波羅蜜多不應觀色若我若無我不應觀受想行識若我若無我何以故色色自性空受想行識受想行識自性空是色自性即非自性是受想行識自性亦非自性若非自性即是布施波羅蜜多於此布施波羅蜜多色不可得彼我無我亦不可得受想行識皆不可得彼我無我亦不可得所以者何此中尚無色等可得何況有彼我與無我汝若能修如是布施是修布施波羅蜜多復作是言汝善男子應修布施波羅蜜多不應觀色若淨若不淨不應觀受想行識若淨若不淨何以故色色自性空受想行識受想行識自性空是色自性即非自性是受想行識自性亦非自性若非自性即是布施波羅蜜多於此布施波羅蜜多色不可得彼淨不淨亦不可得受想行識皆不可得彼淨不淨亦不可得所以者何此中尚無色等可得何況有