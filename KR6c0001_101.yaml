body:
  text: 時天帝釋復白佛言世尊般若波羅蜜多甚為希有若有攝受般若波羅蜜多則為攝受布施淨戒安忍精進靜慮般若波羅蜜多若有攝受般若波羅蜜多則為攝受內空外空內外空空空大空勝義空有為空無為空畢竟空無際空散空無變異空本性空自相空共相空一切法空不可得空無性空自性空無性自性空若有攝受般若波羅蜜多則為攝受真如法界法性不虛妄性不變異性平等性離生性法定法住實際虛空界不思議界若有攝受般若波羅蜜多則為攝受苦聖諦集聖諦滅聖諦道聖諦若有攝受般若波羅蜜多則為攝受四靜慮四無量四無色定若有攝受般若波羅蜜多則為攝受八解脫八勝處九次第定十遍處若有攝受般若波羅蜜多則為攝受四念住四正斷四神足五根五力七等覺支八聖道支若有攝受般若波羅蜜多則為攝受空解脫門無相解脫門無願解脫門若有攝受般若波羅蜜多則為攝受五眼六神通若有攝受般若波羅蜜多則為攝受佛十力四無所畏四無礙解大慈大悲大喜大捨十八佛不共法若有攝受般若波羅蜜多則為攝受無忘失法恆住捨性若有攝受般若波羅蜜多則為攝受一切智道相智一切相智若有攝受般若波羅蜜多則為攝受一切陀羅尼門一切三摩地門若有攝受般若波羅蜜多則為攝受預流果一來果不還果阿羅漢果若有攝受般若波羅蜜多則為攝受獨覺菩提若有攝受般若波羅蜜多則為攝受菩薩十地若有攝受般若波羅蜜多則為攝受無上正等菩提若有攝受般若波羅蜜多則為攝受世間出世間一切善法爾時佛告天帝釋言如是如是如汝所説般若波羅蜜多甚為希有若於般若波羅蜜多能攝受者則能攝受布施淨戒安忍精進靜慮般若波羅蜜多若於般若波羅蜜多能攝受者則能攝受內空外空內外空空空大空勝義空有為空無為空畢竟空無際空散空無變異空本性空自相空共相空一切法空不可得空無性空自性空無性自性空若於般若波羅蜜多能攝受者則能攝受真如法界法性不虛妄性不變異性平等性離生性法定法住實際虛空界不思議界若於般若波羅蜜多能攝受者則能攝受苦聖諦集聖諦滅聖諦道聖諦若於般若波羅蜜多能攝受者則能攝受四靜慮四無量四無色定若於般若波羅蜜多能攝受者則能攝受八解脫八勝處九次第定十遍處若於般若波羅蜜多能攝受者則能攝受四念住四正斷四神足五根五力七等覺支八聖道支若於般若波羅蜜多能攝受者則能攝受空解脫門無相解脫門無願解脫門若於般若波羅蜜多能攝受者則能攝受五眼六神通若於般若波羅蜜多能攝受者則能攝受佛十力四無所畏四無礙解大慈大悲大喜大捨十八佛不共法若於般若波羅蜜多能攝受者則能攝受無忘失法恆住捨性若於般若波羅蜜多能攝受者則能攝受一切智道相智一切相智若於般若波羅蜜多能攝受者則能攝受一切陀羅尼門一切三摩地門若於般若波羅蜜多能攝受者則能攝受預流果一來果不還果阿羅漢果若於般若波羅蜜多能攝受者則能攝受獨覺菩提若於般若波羅蜜多能攝受者則能攝受菩薩十地若於般若波羅蜜多能攝受者則能攝受無上正等菩提若於般若波羅蜜多能攝受者則能攝受世間出世間一切善法復次憍尸迦若善男子善女人等於此般若波羅蜜多受持讀誦精勤修學如理思惟書寫解説廣令流布是善男子善女人等現法後法功德勝利汝應諦聽極善作意吾當為汝分別解説天帝釋言唯然大聖願時為説我等樂聞佛言憍尸迦若有種種外道梵志若諸惡魔及魔眷屬若餘暴惡增上慢者於此菩薩摩訶薩所欲為讎隙凌辱違害彼適興心速遭殃禍自當殄滅不果所願何以故憍尸迦是菩薩摩訶薩以應一切智智心用無所得為方便長夜修行布施淨戒安忍精進靜慮般若波羅蜜多以大悲願而為上首若諸有情為慳貪故長夜鬪諍是菩薩摩訶薩於內外法一切悉捨方便令彼安住布施波羅蜜多若諸有情長夜破戒是菩薩摩訶薩於內外法一切悉捨方便令彼安住淨戒波羅蜜多若諸有情長夜忿恚是菩薩摩訶薩於內外法一切悉捨方便令彼安住安忍波羅蜜多若諸有情長夜懈怠是菩薩摩訶薩於內外法一切悉捨方便令彼安住精進波羅蜜多若諸有情長夜心亂是菩薩摩訶薩於內外法一切悉捨方便令彼安住靜慮波羅蜜多若諸有情長夜愚癡是菩薩摩訶薩於內外法一切悉捨方便令彼安住般若波羅蜜多若諸有情流轉生死長夜恆為貪瞋癡等隨眠纏垢之所擾亂是菩薩摩訶薩能以種種善巧方便令彼斷滅永離生死或安立彼令住內空外空內外空空空大空勝義空有為空無為空畢竟空無際空散空無變異空本性空自相空共相空一切法空不可得空無性空自性空無性自性空或安立彼令住真如法界法性不虛妄性不變異性平等性離生性法定法住實際虛空界不思議界或安立彼令住苦聖諦集聖諦滅聖諦道聖諦或安立彼令住四靜慮四無量四無色定或安立彼令住八解脫八勝處九次第定十遍處或安立彼令住四念住四正斷四神足五根五力七等覺支八聖道支或安立彼令住空解脫門無相解脫門無願解脫門或安立彼令住五眼六神通或安立彼令住佛十力四無所畏四無礙解大慈大悲大喜大捨十八佛不共法或安立彼令住無忘失法恆住捨性或安立彼令住一切智道相智一切相智或安立彼令住一切陀羅尼門一切三摩地門或安立彼令住預流果一來果不還果阿羅漢果或安立彼令住獨覺菩提或安立彼令住菩薩十地或安立彼令住無上正等菩提或安立彼令住世間出世間一切善法憍尸迦如是名為受持讀誦精勤修學如理思惟書寫解説流布般若波羅蜜多菩薩摩訶薩所獲現法功德勝利憍尸迦是菩薩摩訶薩由於般若波羅蜜多受持讀誦精勤修學如理思惟書寫解説廣令流布於當來世速證無上正等菩提轉妙法輪度無量衆隨本所願安立有情令於三乘修學究竟乃至證入無餘涅槃憍尸迦如是名為受持讀誦精勤修學如理思惟書寫解説流布般若波羅蜜多菩薩摩訶薩所獲後法功德勝利復次憍尸迦若善男子善女人等於此般若波羅蜜多受持讀誦精勤修學如理思惟書寫解説廣令流布其地方所若有惡魔及魔眷屬或有種種外道梵志及餘暴惡增上慢者憎嫉般若波羅蜜多欲為障礙詰責違拒令速隱沒終不能成彼因暫聞般若聲故衆惡漸滅功德漸生後依三乘得盡苦際憍尸迦如有妙藥名曰莫耆是藥威勢能銷衆毒有大毒蛇飢行求食遇見生類欲螫噉之其生怖死走投妙藥蛇聞藥氣尋便退走何以故憍尸迦由此莫耆具大威力能伏衆毒益身命故當知般若波羅蜜多具大勢力亦復如是若善男子善女人輩受持讀誦精勤修學如理思惟書寫解説廣令流布諸惡魔等於此菩薩摩訶薩所欲為惡事由此般若波羅蜜多威神力故令彼惡事於其方所自當殄滅何以故憍尸迦由此般若具大威力能摧惡法增衆善故憍尸迦云何般若波羅蜜多能滅惡法增長衆善憍尸迦如是般若波羅蜜多能滅貪欲瞋恚愚癡增彼對治憍尸迦如是般若波羅蜜多能滅無明行識名色六處觸受愛取有生老死愁歎苦憂惱純大苦蘊增彼對治憍尸迦如是般若波羅蜜多能滅一切障蓋隨眠纏垢結縛增彼對治憍尸迦如是般若波羅蜜多能滅我見有情見命者見生者見養育者見士夫見補特伽羅見意生見儒童見作者見受者見知者見見者見增彼對治憍尸迦如是般若波羅蜜多能滅一切常見斷見有見無見乃至種種諸惡見趣增彼對治憍尸迦如是般若波羅蜜多能滅所有慳貪破戒忿恚懈怠散亂愚癡增彼對治憍尸迦如是般若波羅蜜多能滅所有常想樂想我想淨想增彼對治憍尸迦如是般若波羅蜜多能滅一切貪行瞋行癡行慢行疑見行等增彼對治憍尸迦如是般若波羅蜜多能滅色取增彼對治能滅受想行識取增彼對治憍尸迦如是般若波羅蜜多能滅眼處取增彼對治能滅耳鼻舌身意處取增彼對治能滅色處取增彼對治能滅聲香味觸法處取增彼對治憍尸迦如是般若波羅蜜多能滅眼界取增彼對治能滅色界眼識界及眼觸眼觸為緣所生諸受取增彼對治能滅耳界取增彼對治能滅聲界耳識界及耳觸耳觸為緣所生諸受取增彼對治能滅鼻界取增彼對治能滅香界鼻識界及鼻觸鼻觸為緣所生諸受取增彼對治能滅舌界取增彼對治能滅味界舌識界及舌觸舌觸為緣所生諸受取增彼對治能滅身界取增彼對治能滅觸界身識界及身觸身觸為緣所生諸受取增彼對治能滅意界取增彼對治能滅法界意識界及意觸意觸為緣所生諸受取增彼對治憍尸迦如是般若波羅蜜多能滅地界取增彼對治能滅水火風空識界取增彼對治憍尸迦如是般若波羅蜜多能滅苦聖諦取增彼對治能滅集滅道聖諦取增彼對治憍尸迦如是般若波羅蜜多能滅無明取增彼對治能滅行識名色六處觸受愛取有生老死愁歎苦憂惱取增彼對治憍尸迦如是般若波羅蜜多能滅內空取增彼對治能滅外空內外空空空大空勝義空有為空無為空畢竟空無際空散空無變異空本性空自相空共相空一切法空不可得空無性空自性空無性自性空取增彼對治憍尸迦如是般若波羅蜜多能滅真如取增彼對治能滅法界法性不虛妄性不變異性平等性離生性法定法住實際虛空界不思議界取增彼對治憍尸迦如是般若波羅蜜多能滅布施波羅蜜多取增彼對治能滅淨戒安忍精進靜慮般若波羅蜜多取增彼對治憍尸迦如是般若波羅蜜多能滅四靜慮取增彼對治能滅四無量四無色定取增彼對治憍尸迦如是般若波羅蜜多能滅八解脫取增彼對治能滅八勝處九次第定十遍處取增彼對治憍尸迦如是般若波羅蜜多能滅四念住取增彼對治能滅四正斷四神足五根五力七等覺支八聖道支取增彼對治憍尸迦如是般若波羅蜜多能滅空解脫門取增彼對治能滅無相無願解脫門取增彼對治憍尸迦如是般若波羅蜜多能滅五眼取增彼對治能滅六神通取增彼對治憍尸迦如是般若波羅蜜多能滅佛十力取增彼對治能滅四無所畏四無礙解大慈大悲大喜大捨十八佛不共法取增彼對治憍尸迦如是般若波羅蜜多能滅無忘失法取增彼對治能滅恆住捨性取增彼對治憍尸迦如是般若波羅蜜多能滅一切智取增彼對治能滅道相智一切相智取增彼對治憍尸迦如是般若波羅蜜多能滅一切陀羅尼門取增彼對治能滅一切三摩地門取增彼對治憍尸迦如是般若波羅蜜多能滅預流取增彼對治能滅一來不還阿羅漢取增彼對治憍尸迦如是般若波羅蜜多能滅預流向預流果取增彼對治能滅一來向一來果不還向不還果阿羅漢向阿羅漢果取增彼對治憍尸迦如是般若波羅蜜多能滅獨覺取增彼對治能滅獨覺向獨覺果取增彼對治憍尸迦如是般若波羅蜜多能滅菩薩摩訶薩取增彼對治能滅三藐三佛陀取增彼對治憍尸迦如是般若波羅蜜多能滅菩薩摩訶薩法取增彼對治能滅無上正等菩提取增彼對治憍尸迦如是般若波羅蜜多能滅聲聞乘取增彼對治能滅獨覺乘無上乘取增彼對治憍尸迦如是般若波羅蜜多乃至能滅般涅槃取增彼對治憍尸迦如是般若波羅蜜多能滅一切魔所住法及能生長一切善事是故般若波羅蜜多有無數量大威神力復次憍尸迦若善男子善女人等於此般若波羅蜜多至心聽聞受持讀誦精勤修學如理思惟書寫解説廣令流布是菩薩摩訶薩常為三千大千世界四大