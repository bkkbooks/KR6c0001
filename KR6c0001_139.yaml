body:
  text: 復次憍尸迦若善男子善女人等為發無上菩提心者説一切智若常若無常説道相智一切相智若常若無常説一切智若樂若苦説道相智一切相智若樂若苦説一切智若我若無我説道相智一切相智若我若無我説一切智若淨若不淨説道相智一切相智若淨若不淨若有能依如是等法修行靜慮是行靜慮波羅蜜多復作是説行靜慮者應求一切智若常若無常應求道相智一切相智若常若無常應求一切智若樂若苦應求道相智一切相智若樂若苦應求一切智若我若無我應求道相智一切相智若我若無我應求一切智若淨若不淨應求道相智一切相智若淨若不淨若有能求如是等法修行靜慮是行靜慮波羅蜜多憍尸迦若善男子善女人等如是求一切智若常若無常求道相智一切相智若常若無常求一切智若樂若苦求道相智一切相智若樂若苦求一切智若我若無我求道相智一切相智若我若無我求一切智若淨若不淨求道相智一切相智若淨若不淨依此等法行靜慮者我説名為行有所得相似靜慮波羅蜜多憍尸迦如前所説當知皆是説有所得相似靜慮波羅蜜多復次憍尸迦若善男子善女人等為發無上菩提心者説一切陀羅尼門若常若無常説一切三摩地門若常若無常説一切陀羅尼門若樂若苦説一切三摩地門若樂若苦説一切陀羅尼門若我若無我説一切三摩地門若我若無我説一切陀羅尼門若淨若不淨説一切三摩地門若淨若不淨若有能依如是等法修行靜慮是行靜慮波羅蜜多復作是説行靜慮者應求一切陀羅尼門若常若無常應求一切三摩地門若常若無常應求一切陀羅尼門若樂若苦應求一切三摩地門若樂若苦應求一切陀羅尼門若我若無我應求一切三摩地門若我若無我應求一切陀羅尼門若淨若不淨應求一切三摩地門若淨若不淨若有能求如是等法修行靜慮是行靜慮波羅蜜多憍尸迦若善男子善女人等如是求一切陀羅尼門若常若無常求一切三摩地門若常若無常求一切陀羅尼門若樂若苦求一切三摩地門若樂若苦求一切陀羅尼門若我若無我求一切三摩地門若我若無我求一切陀羅尼門若淨若不淨求一切三摩地門若淨若不淨依此等法行靜慮者我説名為行有所得相似靜慮波羅蜜多憍尸迦如前所説當知皆是説有所得相似靜慮波羅蜜多復次憍尸迦若善男子善女人等為發無上菩提心者説預流向預流果若常若無常説一來向一來果不還向不還果阿羅漢向阿羅漢果若常若無常説預流向預流果若樂若苦説一來向一來果不還向不還果阿羅漢向阿羅漢果若樂若苦説預流向預流果若我若無我説一來向一來果不還向不還果阿羅漢向阿羅漢果若我若無我説預流向預流果若淨若不淨説一來向一來果不還向不還果阿羅漢向阿羅漢果若淨若不淨若有能依如是等法修行靜慮是行靜慮波羅蜜多復作是説行靜慮者應求預流向預流果若常若無常應求一來向乃至阿羅漢果若常若無常應求預流向預流果若樂若苦應求一來向乃至阿羅漢果若樂若苦應求預流向預流果若我若無我應求一來向乃至阿羅漢果若我若無我應求預流向預流果若淨若不淨應求一來向乃至阿羅漢果若淨若不淨若有能求如是等法修行靜慮是行靜慮波羅蜜多憍尸迦若善男子善女人等如是求預流向預流果若常若無常求一來向乃至阿羅漢果若常若無常求預流向預流果若樂若苦求一來向乃至阿羅漢果若樂若苦求預流向預流果若我若無我求一來向乃至阿羅漢果若我若無我求預流向預流果若淨若不淨求一來向乃至阿羅漢果若淨若不淨依此等法行靜慮者我説名為行有所得相似靜慮波羅蜜多憍尸迦如前所説當知皆是説有所得相似靜慮波羅蜜多復次憍尸迦若善男子善女人等為發無上菩提心者説一切獨覺菩提若常若無常説一切獨覺菩提若樂若苦説一切獨覺菩提若我若無我説一切獨覺菩提若淨若不淨若有能依如是等法修行靜慮是行靜慮波羅蜜多復作是説行靜慮者應求一切獨覺菩提若常若無常應求一切獨覺菩提若樂若苦應求一切獨覺菩提若我若無我應求一切獨覺菩提若淨若不淨若有能求如是等法修行靜慮是行靜慮波羅蜜多憍尸迦若善男子善女人等如是求一切獨覺菩提若常若無常求一切獨覺菩提若樂若苦求一切獨覺菩提若我若無我求一切獨覺菩提若淨若不淨依此等法行靜慮者我説名為行有所得相似靜慮波羅蜜多憍尸迦如前所説當知皆是説有所得相似靜慮波羅蜜多復次憍尸迦若善男子善女人等為發無上菩提心者説一切菩薩摩訶薩行若常若無常説一切菩薩摩訶薩行若樂若苦説一切菩薩摩訶薩行若我若無我説一切菩薩摩訶薩行若淨若不淨若有能依如是等法修行靜慮是行靜慮波羅蜜多復作是説行靜慮者應求一切菩薩摩訶薩行若常若無常應求一切菩薩摩訶薩行若樂若苦應求一切菩薩摩訶薩行若我若無我應求一切菩薩摩訶薩行若淨若不淨若有能求如是等法修行靜慮是行靜慮波羅蜜多憍尸迦若善男子善女人等如是求一切菩薩摩訶薩行若常若無常求一切菩薩摩訶薩行若樂若苦求一切菩薩摩訶薩行若我若無我求一切菩薩摩訶薩行若淨若不淨依此等法行靜慮者我説名為行有所得相似靜慮波羅蜜多憍尸迦如前所説當知皆是説有所得相似靜慮波羅蜜多復次憍尸迦若善男子善女人等為發無上菩提心者説諸佛無上正等菩提若常若無常説諸佛無上正等菩提若樂若苦説諸佛無上正等菩提若我若無我説諸佛無上正等菩提若淨若不淨若有能依如是等法修行靜慮是行靜慮波羅蜜多復作是説行靜慮者應求諸