  - {type: punctuation, offset: 1244, content: 「, id: KR6c0001_T_085-bkkpn212}
  - {type: variant, offset: 1244, length: 485, content: 「憍尸迦！布施波羅蜜多但假名，淨戒、安忍、精進、靜慮、般若波羅蜜多但假名，如是假名不離法性，具壽善現不壞如是布施波羅蜜多等假名而說布施波羅蜜多等法性。所以者何？布施波羅蜜多等法性無壞無不壞，是故善現所說亦無壞無不壞。「憍尸迦！四靜慮但假名，四無量、四無色定但假名，如是假名不離法性，具壽善現不壞如是四靜慮等假名而說四靜慮等法性。所以者何？四靜慮等法性無壞無不壞，是故善現所說亦無壞無不壞。「憍尸迦！八解脫但假名，八勝處、九次第定、十遍處但假名，如是假名不離法性，具壽善現不壞如是八解脫等假名而說八解脫等法性。所以者何？八解脫等法性無壞無不壞，是故善現所說亦無壞無不壞。「憍尸迦！四念住但假名，四正斷、四神足、五根、五力、七等覺支、八聖道支但假名，如是假名不離法性，具壽善現不壞如是四念住等假名而說四念住等法性。所以者何？四念住等法性無壞無不壞，是故善現所說亦無壞無不壞。「憍尸迦！空解脫門但假名，無相、無願解脫門但假名，如是假名不離法性，具壽善現不壞如是空解脫門等假名而說空解脫門等法性。所以者何？空解脫門等法性無壞無不壞，是故善現所說亦無壞無不壞。「憍尸迦！五眼但假名，六神通但假名，如是假名不離法性，具壽善現不壞如是五眼等假名而說五眼等法性。所以者何？五眼等法性無壞無不壞，是故善現所說亦無壞無不壞。, 元: ''}
