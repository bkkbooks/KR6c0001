body:
  text: 世尊以何無二為方便迴向一切智智修習佛十力四無所畏四無礙解大慈大悲大喜大捨十八佛不共法以何無生為方便無所得為方便迴向一切智智修習佛十力四無所畏四無礙解大慈大悲大喜大捨十八佛不共法世尊以何無二為方便迴向一切智智修習無忘失法恒住捨性以何無生為方便無所得為方便迴向一切智智修習無忘失法恒住捨性世尊以何無二為方便迴向一切智智修習一切智道相智一切相智以何無生為方便無所得為方便迴向一切智智修習一切智道相智一切相智世尊以何無二為方便迴向一切智智修習一切陀羅尼門一切三摩地門以何無生為方便無所得為方便迴向一切智智修習一切陀羅尼門一切三摩地門世尊以何無二為方便迴向一切智智修習菩薩摩訶薩行以何無生為方便無所得為方便迴向一切智智修習菩薩摩訶薩行世尊以何無二為方便迴向一切智智修習無上正等菩提以何無生為方便無所得為方便迴向一切智智修習無上正等菩提佛言慶喜汝今當知以色無二為方便無生為方便無所得為方便迴向一切智智修習布施淨戒安忍精進靜慮般若波羅蜜多以受想行識無二為方便無生為方便無所得為方便迴向一切智智修習布施淨戒安忍精進靜慮般若波羅蜜多慶喜當知以色無二為方便無生為方便無所得為方便迴向一切智智安住內空外空內外空空空大空勝義空有為空無為空畢竟空無際空散空無變異空本性空自相空共相空一切法空不可得空無性空自性空無性自性空以受想行識無二為方便無生為方便無所得為方便迴向一切智智安住內空乃至無性自性空慶喜當知以色無二為方便無生為方便無所得為方便迴向一切智智安住真如法界法性不虛妄性不變異性平等性離生性法定法住實際虛空界不思議界以受想行識無二為方便無生為方便無所得為方便迴向一切智智安住真如乃至不思議界慶喜當知以色無二為方便無生為方便無所得為方便迴向一切智智安住苦集滅道聖諦以受想行識無二為方便無生為方便無所得為方便迴向一切智智安住苦集滅道聖諦慶喜當知以色無二為方便無生為方便無所得為方便迴向一切智智修習四靜慮四無量四無色定以受想行識無二為方便無生為方便無所得為方便迴向一切智智修習四靜慮四無量四無色定慶喜當知以色無二為方便無生為方便無所得為方便迴向一切智智修習八解脫八勝處九次第定十遍處以受想行識無二為方便無生為方便無所得為方便迴向一切智智修習八解脫八勝處九次第定十遍處慶喜當知以色無二為方便無生為方便無所得為方便迴向一切智智修習四念住四正斷四神足五根五力七等覺支八聖道支以受想行識無二為方便無生為方便無所得為方便迴向一切智智修習四念住四正斷四神足五根五力七等覺支八聖道支慶喜當知以色無二為方便無生為方便無所得為方便迴向一切智智修習空解脫門無相解脫門無願解脫門以受想行識無二為方便無生為方便無所得為方便迴向一切智智修習空解脫門無相解脫門無願解脫門慶喜當知以色無二為方便無生為方便無所得為方便迴向一切智智修習五眼六神通以受想行識無二為方便無生為方便無所得為方便迴向一切智智修習五眼六神通慶喜當知以色無二為方便無生為方便無所得為方便迴向一切智智修習佛十力四無所畏四無礙解大慈大悲大喜大捨十八佛不共法以受想行識無二為方便無生為方便無所得為方便迴向一切智智修習佛十力四無所畏四無礙解大慈大悲大喜大捨十八佛不共法慶喜當知以色無二為方便無生為方便無所得為方便迴向一切智智修習無忘失法恒住捨性以受想行識無二為方便無生為方便無所得為方便迴向一切智智修習無忘失法恒住捨性慶喜當知以色無二為方便無生為方便無所得為方便迴向一切智智修習一切智道相智一切相智以受想行識無二為方便無生為方便無所得為方便迴向一切智智修習一切智道相智一切相智慶喜當知以色無二為方便無生為方便無所得為方便迴向一切智智修習一切陀羅尼門一切三摩地門以受想行識無二為方便無生為方便無所得為方便迴向一切智智修習一切陀羅尼門一切三摩地門慶喜當知以色無二為方便無生為方便無所得為方便迴向一切智智修習菩薩摩訶薩行以受想行識無二為方便無生為方便無所得為方便迴向一切智智修習菩薩摩訶薩行慶喜當知以色無二為方便無生為方便無所得為方便迴向一切智智修習無上正等菩提以受想行識無二為方便無生為方便無所得為方便迴向一切智智修習無上正等菩提慶喜當知以眼處無二為方便無生為方便無所得為方便迴向一切智智修習布施淨戒安忍精進靜慮般若波羅蜜多以耳鼻舌身意處無二為方便無生為方便無所得為方便迴向一切智智修習布施淨戒安忍精進靜慮般若波羅蜜多慶喜當知以色處無二為方便無生為方便無所得為方便迴向一切智智修習布施淨戒安忍精進靜慮般若波羅蜜多以聲香味觸法處無二為方便無生為方便無所得為方便迴向一切智智修習布施淨戒安忍精進靜慮般若波羅蜜多慶喜當知以眼處無二為方便無生為方便無所得為方便迴向一切智智安住內空外空內外空空空大空勝義空有為空無為空畢竟空無際空散空無變異空本性空自相空共相空一切法空不可得空無性空自性空無性自性空以耳鼻舌身意處無二為方便無生為方便無所得為方便迴向一切智智安住內空乃至無性自性空慶喜當知以色處無