body:
  text: 爾時北方盡殑伽沙等世界最後世界名曰最勝佛號勝帝如來應正等覺明行圓滿善逝世間解無上丈夫調御士天人師佛薄伽梵時現在彼安隱住持為諸菩薩摩訶薩衆說大般若波羅蜜多彼有菩薩名曰勝授見此大光大地變動及佛身相心懷猶豫前詣佛所頂禮雙足白言世尊何因何緣而有此瑞時勝帝佛告勝授菩薩摩訶薩言善男子從此南方盡殑伽沙等世界最後世界名曰堪忍佛號釋迦牟尼如來應正等覺明行圓滿善逝世間解無上丈夫調御士天人師佛薄伽梵今現在彼安隱住持將為菩薩摩訶薩衆說大般若波羅蜜多彼佛神力故現斯瑞勝授聞已歡喜踊躍重白佛言世尊我今請往堪忍世界觀禮供養釋迦牟尼如來及諸菩薩摩訶薩衆得無礙解陀羅尼門三摩地門神通自在住最後身紹尊位者唯願慈悲哀愍垂許時勝帝佛告勝授菩薩言善哉善哉今正是時隨汝意往即以千莖金色蓮花其花千葉衆寶莊嚴授勝授菩薩而誨之言汝持此花至釋迦牟尼佛所如我詞曰勝帝如來致問無量少病少惱起居輕利氣力調和安樂住不世事可忍不衆生易度不持此蓮花以寄世尊而為佛事汝至彼界應住正知觀彼佛土及諸大衆勿懷輕慢而自毀傷所以者何彼諸菩薩威德難及悲願熏心以大因緣而生彼土時勝授菩薩受花奉敕與無量百千俱胝那庾多出家在家菩薩摩訶薩及無數百千童男童女頂禮佛足右繞奉辭各持無量種種花香寶幢幡蓋衣服寶飾及餘供具發引而來所經北方殑伽沙等諸佛世界一一佛所供養恭敬尊重讚歎無空過者至此佛所頂禮雙足繞百千匝却住一面勝授菩薩前白佛言世尊從此北方盡殑伽沙等世界最後世界名曰最勝佛號勝帝如來應正等覺明行圓滿善逝世間解無上丈夫調御士天人師佛薄伽梵致問世尊無量少病少惱起居輕利氣力調和安樂住不世事可忍不衆生易度不持此千莖金色蓮花以寄世尊而為佛事時釋迦牟尼佛受此蓮花還散北方殑伽沙等諸佛世界佛神力故令此蓮花遍諸佛土諸花臺中各有化佛結跏趺坐為諸菩薩說大般若波羅蜜多相應之法有情聞者必得無上正等菩提是時勝授及諸眷屬見此事已歡喜踊躍歎未曾有各隨善根供具多少供養恭敬尊重讚歎佛菩薩已退坐一面如是最後世界已前所有北方一一佛土各有如來現為大衆宣說妙法是諸佛所亦各有一上首菩薩見此大光大地變動及佛身相前詣佛所白言世尊何因何緣而有此瑞時彼彼佛各各報言於此南方有堪忍世界佛號釋迦牟尼將為菩薩說大般若波羅蜜多彼佛神力故現斯瑞上首菩薩聞已歡喜各各請往堪忍世界觀禮供養佛及菩薩彼諸如來讚善聽往各以金色千寶蓮花而告之言汝可持此至彼佛所具陳我辭致問無量少病少惱起居輕利氣力調和安樂住不世事可忍不衆生易度不持此蓮花以寄世尊而為佛事汝至彼界應住正知觀彼佛土及諸菩薩勿懷輕慢而自毀傷所以者何彼諸菩薩威德難及悲願熏心以大因緣而生彼土一一上首受花奉敕各與無量無數菩薩童男童女辭佛持供發引而來所經佛土一一供養佛及菩薩無空過者到此佛所頂禮雙足繞百千匝奉花陳事佛受花已還散北方佛神力故遍諸佛土諸花臺中各有化佛為諸菩薩說大般若波羅蜜多令諸聞者必獲無上正等菩提上首菩薩及諸眷屬見已歡喜歎未曾有各隨善根供具多少供養恭敬尊重讚歎佛菩薩已退坐一面爾時東北方盡殑伽沙等世界最後世界名定莊嚴佛號定象勝德如來應正等覺明行圓滿善逝世間解無上丈夫調御士天人師佛薄伽梵時現在彼安隱住持為諸菩薩摩訶薩衆說大般若波羅蜜多彼有菩薩名離塵勇猛見此大光大地變動及佛身相心懷猶豫前詣佛所頂禮雙足白言世尊何因何緣而有此瑞時定象勝德佛告離塵勇猛菩薩摩訶薩言善男子從此西南方盡殑伽沙等世界最後世界名曰堪忍佛號釋迦牟尼如來應正等覺明行圓滿善逝世間解無上丈夫調御士天人師佛薄伽梵今現在彼安隱住持將為菩薩摩訶薩衆說大般若波羅蜜多彼佛神力故現斯瑞時離塵勇猛聞佛所說歡喜踊躍重白佛言世尊我今請往堪忍世界觀禮供養釋迦牟尼如來及諸菩薩摩訶薩衆得無礙解陀羅尼門三摩地門神通自在住最後身紹尊位者唯願慈悲哀愍垂許時定象勝德佛告離塵勇猛菩薩言善哉善哉今正是時隨汝意往即以千莖金色蓮花其花千葉衆寶莊嚴授離塵勇猛菩薩而誨之言汝持此華至釋迦牟尼佛所如我詞曰定象勝德如來致問無量少病少惱起居輕利氣力調和安樂住不世事可忍不衆生易度不持此蓮花以寄世尊而為佛事汝至彼界應住正知觀彼佛土及諸大衆勿懷輕慢而自毀傷所以者何彼諸菩薩威德難及悲願熏心以大因緣而生彼土時離塵勇猛菩薩受花奉敕與無量百千俱胝那庾多出家在家菩薩摩訶薩及無數百千童男童女頂禮佛足右繞奉辭各持無量種種花香寶幢幡蓋衣服寶飾及餘供具發引而來所經東北方殑伽沙等諸佛世界一一佛所供養恭敬尊重讚歎無空過者至此佛所頂禮雙足繞百千匝却住一面離塵勇猛菩薩前白佛言世尊從此東北方盡殑伽沙等世界最後世界名定莊嚴佛號定象勝德如來應正等覺明行圓滿善逝世間解無上丈夫調御士天人師佛薄伽梵致問世尊無量少病少惱起居輕利氣力調和安樂住不世事可忍不衆生易度不持此千莖金色蓮花以寄世尊而為佛事時釋迦牟尼佛受此蓮花還散東北方殑伽沙等諸佛世界佛神力故令此蓮花遍諸佛土諸花臺中各有化佛結跏趺坐為諸菩薩說大般若波羅蜜多相應之法有情聞者必得無上正等菩提時離塵勇猛及諸眷屬見此事已歡喜踊躍歎