body:
  text: 復次憍尸迦若善男子善女人等為發無上菩提心者宣説靜慮波羅蜜多作如是言汝善男子應修靜慮波羅蜜多不應觀一切陀羅尼門若常若無常不應觀一切三摩地門若常若無常何以故一切陀羅尼門一切陀羅尼門自性空一切三摩地門一切三摩地門自性空是一切陀羅尼門自性即非自性是一切三摩地門自性亦非自性若非自性即是靜慮波羅蜜多於此靜慮波羅蜜多一切陀羅尼門不可得彼常無常亦不可得一切三摩地門不可得彼常無常亦不可得所以者何此中尚無一切陀羅尼門等可得何況有彼常與無常汝若能修如是靜慮是修靜慮波羅蜜多復作是言汝善男子應修靜慮波羅蜜多不應觀一切陀羅尼門若樂若苦不應觀一切三摩地門若樂若苦何以故一切陀羅尼門一切陀羅尼門自性空一切三摩地門一切三摩地門自性空是一切陀羅尼門自性即非自性是一切三摩地門自性亦非自性若非自性即是靜慮波羅蜜多於此靜慮波羅蜜多一切陀羅尼門不可得彼樂與苦亦不可得一切三摩地門不可得彼樂與苦亦不可得所以者何此中尚無一切陀羅尼門等可得何況有彼樂之與苦汝若能修如是靜慮是修靜慮波羅蜜多復作是言汝善男子應修靜慮波羅蜜多不應觀一切陀羅尼門若我若無我不應觀一切三摩地門若我若無我何以故一切陀羅尼門一切陀羅尼門自性空一切三摩地門一切三摩地門自性空是一切陀羅尼門自性即非自性是一切三摩地門自性亦非自性若非自性即是靜慮波羅蜜多於此靜慮波羅蜜多一切陀羅尼門不可得彼我無我亦不可得一切三摩地門不可得彼我無我亦不可得所以者何此中尚無一切陀羅尼門等可得何況有彼我與無我汝若能修如是靜慮是修靜慮波羅蜜多復作是言汝善男子應修靜慮波羅蜜多不應觀一切陀羅尼門若淨若不淨不應觀一切三摩地門若淨若不淨何以故一切陀羅尼門一切陀羅尼門自性空一切三摩地門一切三摩地門自性空是一切陀羅尼門自性即非自性是一切三摩地門自性亦非自性若非自性即是靜慮波羅蜜多於此靜慮波羅蜜多一切陀羅尼門不可得彼淨不淨亦不可得一切三摩地門不可得彼淨不淨亦不可得所以者何此中尚無一切陀羅尼門等可得何況有彼淨與不淨汝若能修如是靜慮是修靜慮波羅蜜多憍尸迦是善男子善女人等作此等説是為宣説真正靜慮波羅蜜多復次憍尸迦若善男子善女人等為發無上菩提心者宣説靜慮波羅蜜多作如是言汝善男子應修靜慮波羅蜜多不應觀預流向預流果若常若無常不應觀一來向一來果不還向不還果阿羅漢向阿羅漢果若常若無常何以故預流向預流果預流向預流果自性空一來向一來果不還向不還果阿羅漢向阿羅漢果一來向乃至阿羅漢果自性空是預流向預流果自性即非自性是一來向乃至阿羅漢果自性亦非自性若非自性即是靜慮波羅蜜多於此靜慮波羅蜜多預流向預流果不可得彼常無常亦不可得一來向乃至阿羅漢果皆不可得彼常無常亦不可得所以者何此中尚無預流向等可得何況有彼常與無常汝若能修如是靜慮是修靜慮波羅蜜多復作是言汝善男子應修靜慮波羅蜜多不應觀預流向預流果若樂若苦不應觀一來向一來果不還向不還果阿羅漢向阿羅漢果若樂若苦何以故預流向預流果預流向預流果自性空一來向一來果不還向不還果阿羅漢向阿羅漢果一來向乃至阿羅漢果自性空是預流向預流果自性即非自性是一來向乃至阿羅漢果自性亦非自性若非自性即是靜慮波羅蜜多於此靜慮波羅蜜多預流向預流果不可得彼樂與苦亦不可得一來向乃至阿羅漢果皆不可得彼樂與苦亦不可得所以者何此中尚無預流向等可得何況有彼樂之與苦汝若能修如是靜慮是修靜慮波羅蜜多復作是言汝善男子應修靜慮波羅蜜多不應觀預流向預流果若我若無我不應觀一來向一來果不還向不還果阿羅漢向阿羅漢果若我若無我何以故預流向預流果預流向預流果自性空一來向一來果不還向不還果阿羅漢向阿羅漢果一來向乃至阿羅漢果自性空是預流向預流果自性即非自性是一來向乃至阿羅漢果自性亦非自性若非自性即是靜慮波羅蜜多於此靜慮波羅蜜多預流向預流果不可得彼我無我亦不可得一來向乃至阿羅漢果皆不可得彼我無我亦不可得所以者何此中尚無預流向等可得何況有彼我與無我汝若能修如是靜慮是修靜慮波羅蜜多復作是言汝善男子應修靜慮波羅蜜多不應觀預流向預流果若淨若不淨不應觀一來向一來果不還向不還果阿羅漢向阿羅漢果若淨若不淨何以故預流向預流果預流向預流果自性空一來向一來果不還向不還果阿羅漢向阿羅漢果一來向乃至阿羅漢果自性空是預流向預流果自性即非自性是一來向乃至阿羅漢果自性亦非自性若非自性即是靜慮波羅蜜多於此靜慮波羅蜜多預流向預流果不可得彼淨不淨亦不可得一來向乃至阿羅漢果皆不可得彼淨不淨亦不可得所以者何此中尚無預流向等可得何況有彼淨與不淨汝若能修如是靜慮是修靜慮波羅蜜多憍尸迦是善男子善女人等作此等説是為宣説真正靜慮波羅蜜多復次憍尸迦若善男子善女人等為發無上菩提心者宣説靜慮波羅蜜多作如是言汝善男子應修靜慮波羅蜜多不應觀一切獨覺菩提若常若無常何以故一切獨覺菩提一切獨覺菩提自性空是一切獨覺菩提自性即非自性若非自性即是靜慮波羅蜜多於此靜慮波羅蜜多一切獨覺菩提不可得彼常無常亦不可得所以者何此中尚無一切獨覺菩提可得何況有彼常與無常汝若能修如是靜慮是