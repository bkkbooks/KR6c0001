body:
  text: 復次憍尸迦若善男子善女人等為發無上菩提心者説真如若常若無常説法界法性不虛妄性不變異性平等性離生性法定法住實際虛空界不思議界若常若無常説真如若樂若苦説法界法性不虛妄性不變異性平等性離生性法定法住實際虛空界不思議界若樂若苦説真如若我若無我説法界法性不虛妄性不變異性平等性離生性法定法住實際虛空界不思議界若我若無我説真如若淨若不淨説法界法性不虛妄性不變異性平等性離生性法定法住實際虛空界不思議界若淨若不淨若有能依如是等法修行布施是行布施波羅蜜多復作是説行布施者應求真如若常若無常應求法界乃至不思議界若常若無常應求真如若樂若苦應求法界乃至不思議界若樂若苦應求真如若我若無我應求法界乃至不思議界若我若無我應求真如若淨若不淨應求法界乃至不思議界若淨若不淨若有能求如是等法修行布施是行布施波羅蜜多憍尸迦若善男子善女人等如是求真如若常若無常求法界乃至不思議界若常若無常求真如若樂若苦求法界乃至不思議界若樂若苦求真如若我若無我求法界乃至不思議界若我若無我求真如若淨若不淨求法界乃至不思議界若淨若不淨依此等法行布施者我説名為行有所得相似布施波羅蜜多憍尸迦如前所説當知皆是説有所得相似布施波羅蜜多復次憍尸迦若善男子善女人等為發無上菩提心者説苦聖諦若常若無常説集滅道聖諦若常若無常説苦聖諦若樂若苦説集滅道聖諦若樂若苦説苦聖諦若我若無我説集滅道聖諦若我若無我説苦聖諦若淨若不淨説集滅道聖諦若淨若不淨若有能依如是等法修行布施是行布施波羅蜜多復作是説行布施者應求苦聖諦若常若無常應求集滅道聖諦若常若無常應求苦聖諦若樂若苦應求集滅道聖諦若樂若苦應求苦聖諦若我若無我應求集滅道聖諦若我若無我應求苦聖諦若淨若不淨應求集滅道聖諦若淨若不淨若有能求如是等法修行布施是行布施波羅蜜多憍尸迦若善男子善女人等如是求苦聖諦若常若無常求集滅道聖諦若常若無常求苦聖諦若樂若苦求集滅道聖諦若樂若苦求苦聖諦若我若無我求集滅道聖諦若我若無我求苦聖諦若淨若不淨求集滅道聖諦若淨若不淨依此等法行布施者我説名為行有所得相似布施波羅蜜多憍尸迦如前所説當知皆是説有所得相似布施波羅蜜多復次憍尸迦若善男子善女人等為發無上菩提心者説四靜慮若常若無常説四無量四無色定若常若無常説四靜慮若樂若苦説四無量四無色定若樂若苦説四靜慮若我若無我説四無量四無色定若我若無我説四靜慮若淨若不淨説四無量四無色定若淨若不淨若有能依如是等法修行布施是行布施波羅蜜多復作是説行布施者應求四靜慮若常若無常應求四無量四無色定若常若無常應求四靜慮若樂若苦應求四無量四無色定若樂若苦應求四靜慮若我若無我應求四無量四無色定若我若無我應求四靜慮若淨若不淨應求四無量四無色定若淨若不淨若有能求如是等法修行布施是行布施波羅蜜多憍尸迦若善男子善女人等如是求四靜慮若常若無常求四無量四無色定若常若無常求四靜慮若樂若苦求四無量四無色定若樂若苦求四靜慮若我若無我求四無量四無色定若我若無我求四靜慮若淨若不淨求四無量四無色定若淨若不淨依此等法行布施者我説名為行有所得相似布施波羅蜜多憍尸迦如前所説當知皆是説有所得相似布施波羅蜜多復次憍尸迦若善男子善女人等為發無上菩提心者説八解脫若常若無常説八勝處九次第定十遍處若常若無常説八解脫若樂若苦説八勝處九次第定十遍處若樂若苦説八解脫若我若無我説八勝處九次第定十遍處若我若無我説八解脫若淨若不淨説八勝處九次第定十遍處若淨若不淨若有能依如是等法修行布施是行布施波羅蜜多復作是説行布施者應求八解脫若常若無常應求八勝處九次第定十遍處若常若無常應求八解脫若樂若苦應求八勝處九次第定十遍處若樂若苦應求八解脫若我若無我應求八勝處九次第定十遍處若我若無我應求八解脫若淨若不淨應求八勝處九次第定十遍處若淨若不淨若有能求如是等法修行布施是行布施波羅蜜多憍尸迦若善男子善女人等如是求八解脫若常若無常求八勝處九次第定十遍處若常若無常求八解脫若樂若苦求八勝處九次第定十遍處若樂若苦求八解脫若我若無我求八勝處九次第定十遍處若我若無我求八解脫若淨若不淨求八勝處九次第定十遍處若淨若不淨依此等法行布施者我説名為行有所得相似布施波羅蜜多憍尸迦如前所説當知皆是説有所得相似布施波羅蜜多復次憍尸迦若善男子善女人等為發無上菩提心者説四念住若常若無常説四正斷四神足五根五力七等覺支八聖道支若常若無常説四念住若樂若苦説四正斷四神足五根五力七等覺支八聖道支若樂若苦説四念住若我若無我説四正斷四神足五根五力七等覺支八聖道支若我若無我説四念住若淨若不淨説四正斷四神足五根五力七等覺支八聖道支若淨若不淨若有能依如是等法修行布施是行布施波羅蜜多復作是説行布施者應求四念住若常若無常應求四正斷乃至八聖道支若常若無常應求四念住若樂若苦應求四正斷乃至八聖道支若樂若苦應求四念住若我若無我應求四正斷乃至八聖道支若我若無我應求四念住若淨若不淨應求四正斷乃至八聖道支若淨若不淨若有能求如是等法修行布施是行布施波羅蜜多憍尸迦若善男子